services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vendas_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db

  nginx:
    image: nginx:1.27-alpine
    container_name: vendas_nginx
    restart: unless-stopped
    ports:
      - '8081:80'
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.4
    container_name: vendas_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: vendas
      MYSQL_USER: vendas_user
      MYSQL_PASSWORD: vendas_pass
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '33060:3306'
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: